name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Python lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check .
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check .
      # Non-blocking while the backlog of type errors is burned down;
      # flip continue-on-error to false once `npx pyright` is clean.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Typecheck (pyright, advisory)
        run: npx --yes pyright backend/src
        continue-on-error: true

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit tests (no AWS)
        run: |
          python -m pytest -m "not integration" -q \
            --cov=src/app --cov-report=term --cov-report=xml \
            --cov-fail-under=50
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  infra:
    name: Infra tests & synth (cdk-nag)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: infra/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: |
          pip install -r requirements.txt pytest
          npm install -g aws-cdk
      - name: CDK assertion tests
        run: python -m pytest tests/ -q
      - name: Synth (runs cdk-nag gate)
        run: cdk synth --quiet
        env:
          CDK_DEFAULT_ACCOUNT: "111111111111"
          CDK_DEFAULT_REGION: us-east-1

  frontend:
    name: Frontend lint, types, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npx eslint .
      - name: Typecheck
        run: npx tsc -b --noEmit
      - name: Tests
        run: npx vitest --run
      - name: Build
        run: npm run build
